<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Geo Environmental Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app app-dashboard">
    <header class="app-header" id="app-header"></header>

    <aside class="panel panel-left">
      <div class="panel-title" data-i18n="dashboard.panelTitle"></div>
      <p class="panel-copy" id="dashboard-intro"></p>
      <div id="dashboard-warning" class="feedback-note hidden"></div>
      <div class="status-grid" id="dashboard-summary"></div>
      <p class="panel-copy" id="dashboard-summary-note"></p>
      <div class="panel-subtitle" data-i18n="dashboard.availableLayers"></div>
      <div class="layer-catalog-list" id="layer-catalog-list"></div>
      <a class="panel-link" href="datasets.html" data-i18n="dashboard.openCatalog"></a>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
      <div class="map-overlay">
        <div class="overlay-title" data-i18n="dashboard.activeLayers"></div>
        <div id="active-layer-list" class="overlay-list"></div>
      </div>
    </main>

    <aside class="panel panel-right">
      <div class="panel-title" data-i18n="dashboard.legendTitle"></div>
      <div class="panel-scroll" id="legend-content"></div>
    </aside>
  </div>

  <script src="vendor/geotiff.browser.min.js"></script>
  <script src="vendor/georaster.browser.min.js"></script>
  <script src="vendor/georaster-layer-for-leaflet.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/geotiff@2.1.3/dist/geotiff.browser.min.js"></script>
  <script src="https://unpkg.com/georaster@1.6.0/dist/georaster.browser.min.js"></script>
  <script src="https://unpkg.com/georaster-layer-for-leaflet@3.10.0/dist/georaster-layer-for-leaflet.min.js"></script>
  <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>
  <script src="i18n.js"></script>
  <script src="app-common.js"></script>
  <script src="script.js"></script>
</body>
</html>
